---
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Set system timezone to UTC
  community.general.timezone:
    name: "{{ common_timezone }}"

- name: Install and configure chrony NTP
  ansible.builtin.apt:
    name: chrony
    state: present

- name: Ensure chrony is started and enabled
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
    use: systemd

- name: Update /etc/hosts with lab VM entries
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+\\s+{{ item.name }}"
    line: "{{ item.ip }} {{ item.name }}"
    state: present
  loop:
    - {ip: "192.168.64.10", name: "wazuh-manager"}
    - {ip: "192.168.64.20", name: "victim-windows"}
    - {ip: "192.168.64.30", name: "kali-attacker"}

- name: Create SOC lab working directory
  ansible.builtin.file:
    path: "{{ soc_lab_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create SOC lab logs directory
  ansible.builtin.file:
    path: "{{ soc_lab_dir }}/logs"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "{{ common_ssh_port | string }}"
    proto: tcp

- name: Enable UFW with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

---
# Configure Windows 11 ARM64 victim endpoint (192.168.64.20)
# Prerequisites:
#   - WinRM enabled (run in PowerShell as Admin):
#       Enable-PSRemoting -Force
#       winrm set winrm/config/service/auth '@{Basic="true"}'
#       winrm set winrm/config/service '@{AllowUnencrypted="true"}'
#   - pip install pywinrm on the Ansible control host
# Run: ansible-playbook playbooks/windows-victim.yml

- name: Configure Windows 11 victim endpoint
  hosts: victims

  roles:
    - role: sysmon
    - role: filebeat

---
# Set up Kali attacker VM with red team tools
# Run: ansible-playbook playbooks/kali-attacker.yml

- name: Configure Kali attacker
  hosts: attacker
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base tools
      ansible.builtin.apt:
        name:
          - nmap
          - metasploit-framework
          - impacket-scripts
          - crackmapexec
          - responder
          - git
          - curl
          - python3-pip
        state: present

    - name: Clone Atomic Red Team
      ansible.builtin.git:
        repo: "https://github.com/redcanaryco/atomic-red-team.git"
        dest: "/home/kali/tools/atomic-red-team"
        depth: 1
      become_user: kali

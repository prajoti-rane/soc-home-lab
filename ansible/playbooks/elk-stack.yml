---
# Deploy ELK stack on the SIEM node
# Run: ansible-playbook playbooks/elk-stack.yml

- name: Deploy Elasticsearch + Logstash + Kibana
  hosts: siem
  become: true
  roles:
    - role: elk
    - role: filebeat
  vars:
    elasticsearch_heap_size: "4g"
    kibana_host: "0.0.0.0"
    kibana_port: 5601
    logstash_beats_port: 5044

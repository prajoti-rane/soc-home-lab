---
# Deploy ELK stack only (useful for iterating on ELK config without touching Wazuh)
# Run: ansible-playbook playbooks/elk-stack.yml

- name: Deploy Elasticsearch, Logstash, and Kibana
  hosts: siem
  become: true

  pre_tasks:
    - name: Gather facts
      ansible.builtin.gather_facts:

  roles:
    - role: elk
    - role: filebeat

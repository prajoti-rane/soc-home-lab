---
test_id: TC-100005
rule_id: 100005
rule_name: Credential Dumping via LSASS Memory Access
mitre_technique: T1003.001
wazuh_rule_file: detections/wazuh-rules/100005-credential-dumping-lsass.xml
sigma_rule_file: detections/sigma/sigma-100005-credential-dumping-lsass.yml

# --- Positive Test ---
positive_test:
  description: >
    Sysmon EventID 10 (ProcessAccess) from mimikatz.exe accessing lsass.exe with
    PROCESS_VM_READ access mask. Simulates credential dumping via procdump or
    Mimikatz sekurlsa::logonpasswords. ART T1003.001 Test 1 uses procdump.
  art_test:
    technique: T1003.001
    test_number: 1
    command: |
      # [victim-windows] Run Atomic Red Team test (requires ART installed on Kali,
      # then transfer/execute on Windows)
      # On victim-windows as SOCAdmin:
      Invoke-AtomicTest T1003.001 -TestNumbers 1
      # This runs: procdump64.exe -accepteula -ma lsass.exe C:\Temp\lsass.dmp
  log_samples:
    - |
      {
        "win": {
          "system": {
            "eventID": "10",
            "channel": "Microsoft-Windows-Sysmon/Operational",
            "computer": "victim-windows"
          },
          "eventdata": {
            "ruleName": "technique_id=T1003.001,technique_name=Credential Dumping",
            "sourceProcessId": "4444",
            "sourceImage": "C:\\Tools\\mimikatz.exe",
            "targetProcessId": "696",
            "targetImage": "C:\\Windows\\system32\\lsass.exe",
            "grantedAccess": "0x1fffff",
            "callTrace": "C:\\Windows\\SYSTEM32\\ntdll.dll|C:\\Windows\\system32\\KERNELBASE.dll"
          }
        }
      }
  expected_output:
    alert_fired: true
    rule_id: 100005
    rule_level: 14
    rule_description_contains: "Credential dumping"
    relevant_fields:
      win.eventdata.sourceImage: "C:\\Tools\\mimikatz.exe"
      win.eventdata.targetImage: "C:\\Windows\\system32\\lsass.exe"
      win.eventdata.grantedAccess: "0x1fffff"

# --- Negative Test ---
negative_test:
  description: >
    WerFault.exe (Windows Error Reporting) accessing lsass.exe — this is
    normal behavior during crash analysis. Rule 100005 has a pcre2 negate
    filter for WerFault.exe and should NOT fire.
  log_samples:
    - |
      {
        "win": {
          "system": { "eventID": "10", "computer": "victim-windows" },
          "eventdata": {
            "sourceImage": "C:\\Windows\\system32\\WerFault.exe",
            "targetImage": "C:\\Windows\\system32\\lsass.exe",
            "grantedAccess": "0x1fffff"
          }
        }
      }
  expected_output:
    alert_fired: false
    note: "WerFault.exe is in the negate filter — parent rule 61612 may fire but not 100005"

validation:
  command: |
    sudo /var/ossec/bin/wazuh-logtest
    # Paste positive JSON event. Expect Rule 100005 level 14.
    # Paste negative JSON event. Should NOT show Rule 100005.
  expected_logtest_output_fragment: "Rule Id: 100005"

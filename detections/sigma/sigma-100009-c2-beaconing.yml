title: C2 Beaconing from Unsigned Binary
id: e5f6a7b8-c9d0-1234-efab-456789012310
status: experimental
description: Detects repeated outbound network connections from an unsigned executable in a writable directory, a high-confidence indicator of a malware C2 implant. Unsigned binaries in Temp/AppData that initiate external network connections almost never represent legitimate software.
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://attack.mitre.org/techniques/T1036/005/
author: Prajoti Rane
date: 2026/05/11
tags:
  - attack.command_and_control
  - attack.defense_evasion
  - attack.t1071.001
  - attack.t1036.005
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    EventID: 3
    Initiated: 'true'
    Signed: 'false'
    Image|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
  timeframe: 5m
  condition: selection | count(DestinationIp) by Image > 10
fields:
  - Image
  - Signed
  - DestinationIp
  - DestinationPort
falsepositives:
  - Self-compiled legitimate utilities (rare in production environments)
level: critical

title: LSASS Memory Access via Sysmon ProcessAccess
id: c3d4e5f6-a7b8-9012-cdef-234567890105
status: experimental
description: Detects non-standard processes accessing LSASS memory (Sysmon EventID 10), which is a primary indicator of credential dumping tools such as Mimikatz, ProcDump, or Sliver's hashdump module.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
  - https://github.com/gentilkiwi/mimikatz
author: Prajoti Rane
date: 2026/05/11
modified: 2026/05/11
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    EventID: 10
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1038'
      - '0x1fffff'
      - '0x143a'
      - '0x40'
      - '0x3000'
  filter_legitimate:
    SourceImage|endswith:
      - '\WerFault.exe'
      - '\wermgr.exe'
      - '\svchost.exe'
      - '\csrss.exe'
      - '\services.exe'
      - '\winlogon.exe'
      - '\MsMpEng.exe'
      - '\SecurityHealthService.exe'
      - '\taskmgr.exe'
  condition: selection and not filter_legitimate
fields:
  - SourceImage
  - TargetImage
  - GrantedAccess
  - SourceProcessId
falsepositives:
  - Legitimate security software that monitors LSASS (EDR agents, AV products not in the allowlist)
  - Crash dump analysis tools run by authorized administrators
level: critical
